info.prjTemplate.help1=This duplicates another template and imports it as the current template. <br/>When you select a template and click the import button, all task information except for the project name will be reset, and all task information from the standard template being imported will be copied.
info.prjTemplate.help2=This sets the relative importance of each task based on the weight assigned to each task.<br/> When weights are assigned, the plan and progress rate of the higher-level tasks are calculated as weighted averages of the lower-level tasks.
info.myProject.help1=You can view the detailed information of a project on a wide screen.
info.myProject.help2=This sets the relative importance of each task based on the weight assigned to each task.<br/> When weights are assigned, the plan and progress rate <br/>of the higher-level tasks are calculated as weighted averages of the lower-level tasks.
info.myProject.help3=The progress rate plan for the current date of a task is automatically calculated based on the start and end dates of the task.
info.myProject.help4=The progress rate of each task is displayed.<br/>If there are subtasks, the progress rate is automatically calculated as a weighted average of the subtasks' progress rates.
info.myProject.help5=This sets the participants who will participate in the project.<br/> Participants can create tasks and register activities.
info.myProject.help6=This sets the targets who can view the project<br/>and leave feedback on the activities registered in the project.
info.myProject.help7=Public(All): All users can view the detailed information of the project in the Status menu.<br/>Public(Member): Only the PM/Business manager/participants/approvers can view the detailed information of the project in the Status menu.<br/>Private: Not visible in the Status menu and not included in the weekly report.
info.myProject.help8=This defines what tasks the participants of the project will be working on.<br/>When registering a task, you can set how many hours each participant will be working on the task by resource category.
info.myProject.help9=You can set the participants who will be involved in a particular task among the participants of the project.<br/>Participants can create tasks and register activities.
info.myProject.help10=You can set the number of hours that participants will work for each resource category in the Project.<br/>Defining working hours allows you to view resource statistics in the WBS using the Resource view feature.
info.myProject.help11=You can import a template to the current project by duplicating it.<br/>When you select a template and click the import button, all task information of the standard template except the project name will be copied, and the existing task information in the current project will be reset.
info.myProject.help12=This sets up a business manager who manages the business. <br/>The project manager has the right to modify the rest of the data except for the basic information of the project.
